<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Masuk Aman - Lapor Sampah</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <span class="logo">🗑️ LaporSampah</span>
            <nav>
                <a href="register.html" class="btn btn-sm" style="color:white; display:inline-block;">Daftar Akun Baru</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="card card-center">
            <h2 style="text-align: center; margin-bottom: 20px; color: var(--text);">Masuk ke Sistem</h2>
            <div class="form-group">
                <label>Nama Pengguna (Username)</label>
                <input type="text" id="log-user" placeholder="Masukkan username Anda" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Kata Sandi (Password)</label>
                <input type="password" id="log-pass" placeholder="Masukkan password Anda">
            </div>
            <button class="btn" onclick="executeLogin()">Autentikasi Sesi</button>
            <p style="text-align: center; margin-top: 15px; font-size: 14px;">
                Belum punya akun warga? <a href="register.html" style="color: var(--secondary); text-decoration: none; font-weight: bold;">Daftar di sini</a>
            </p>
        </div>
    </div>

    <footer style="text-align: center; padding: 20px; font-size: 13px; color: #7f8c8d;">
        <p>&copy; 2026 Tim Blue Team Informatika ITENAS - Proyek Hardening Skema Aplikasi Aman.</p>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
